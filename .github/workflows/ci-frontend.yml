# .github/workflows/ci-frontend.yml
name: CI - Frontend

on:
  push:
    branches: [main]
    paths:
      - 'crunch-front/**'
  pull_request:
    branches: [main]
    paths:
      - 'crunch-front/**'

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crunch-front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: crunch-front/package-lock.json
      - run: npm ci
      - run: npm run lint    # ESLint 검사
      - run: npm run build   # Vite 빌드
