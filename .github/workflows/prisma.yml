# .github/workflows/prisma.yml
name: Prisma Validate

on:
  pull_request:
    paths:
      - 'crunch-back/prisma/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crunch-back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
