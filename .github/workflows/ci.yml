# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crunch-back
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: crunch-back/package-lock.json
      - run: npm ci
      - run: npm run build   # TypeScript 컴파일 오류 감지

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crunch-front
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: crunch-front/package-lock.json
      - run: npm ci
      - run: npm run lint    # ESLint 검사
      - run: npm run build   # Vite 빌드
