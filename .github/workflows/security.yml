# .github/workflows/security.yml
name: Security Audit

on:
  schedule:
    - cron: '0 9 * * 1'  # 매주 월요일 오전 9시
  workflow_dispatch:

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: cd crunch-back && npm audit --audit-level=high
      - run: cd crunch-front && npm audit --audit-level=high
